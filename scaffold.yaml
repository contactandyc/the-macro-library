project_title: The Macro Library
version: 0.2.2
date_created: 2019-08-01
stack: c/cmake
profile: default-knode

base_templates:
  repo: https://github.com/contactandyc/scaffold-templates.git
  ref: main

packages:
  python3: true
  python3-venv: true
  python3-pip: true

kind: header_only

licenses:
  dutch-national-flag:
    spdx: |
      Based on the Dutch national flag problem (https://en.wikipedia.org/wiki/Dutch_national_flag_problem)
      Consulted: Bentley & McIlroy, “Engineering a sort function,”
      Software – Practice and Experience 23(11): 1249–1265 (1993)
    notice: |
      Based on the Dutch national flag problem (https://en.wikipedia.org/wiki/Dutch_national_flag_problem)
      Consulted: Bentley & McIlroy, “Engineering a sort function,”
      Software – Practice and Experience 23(11): 1249–1265 (1993)

license_extras:
  "include/the-macro-library/src/macro_dutch_flag_partition.h": dutch-national-flag

extra_targets: |
  add_custom_target(indent
      COMMAND python3 ${CMAKE_SOURCE_DIR}/bin/indent-macros ${CMAKE_SOURCE_DIR}/include/*/*.h ${CMAKE_SOURCE_DIR}/include/*/*/*.h
      COMMENT "Indenting files..."
  )
  add_custom_target(examples
      COMMAND ${CMAKE_COMMAND} -E echo "Building examples"
      COMMAND ${CMAKE_COMMAND} -E make_directory "${CMAKE_BINARY_DIR}/examples"
      COMMAND ${CMAKE_COMMAND} -E chdir "${CMAKE_BINARY_DIR}/examples" ${CMAKE_COMMAND} -DCMAKE_BUILD_TYPE=$<CONFIG> "${CMAKE_SOURCE_DIR}/examples"
      COMMAND ${CMAKE_COMMAND} --build "${CMAKE_BINARY_DIR}/examples"
      WORKING_DIRECTORY ${CMAKE_BINARY_DIR}
      COMMENT "Building examples"
  )
  install(PROGRAMS ${CMAKE_SOURCE_DIR}/bin/convert-macros-to-code ${CMAKE_SOURCE_DIR}/bin/indent-macros DESTINATION ${CMAKE_INSTALL_BINDIR})
